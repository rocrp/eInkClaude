[platformio]
boards_dir = boards

[env:T5-ePaper-S3]
platform = espressif32@6.5.0
board = T5-ePaper-S3
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = default, esp32_exception_decoder

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLILYGO_T5_EPD47_S3
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git
    bblanchon/ArduinoJson@^7.4.2
